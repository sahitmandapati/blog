  <!-- Subtle orbital arc — systems in motion -->
  <path d="M12 32 Q22 20 32 22 Q42 24 52 32" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.4"/>
  <path d="M12 32 Q22 44 32 42 Q42 40 52 32" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.4"/>
